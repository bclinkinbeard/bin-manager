name: Service Worker Cache Version Guard

on:
  pull_request:
    branches:
      - main

jobs:
  enforce-cache-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure base branch is available
        run: git fetch origin "${GITHUB_BASE_REF}" --depth=1

      - name: Verify service worker cache version bump
        run: node scripts/check-pr-cache-version.js
